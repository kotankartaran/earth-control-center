<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Global Undersea Cable Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#050b16;
color:#00eaff;
}

header{
text-align:center;
padding:10px;
border-bottom:1px solid #00eaff;
}

nav button{
margin:5px;
padding:8px 12px;
background:#071424;
color:#00eaff;
border:1px solid #00eaff;
cursor:pointer;
}

nav button:hover{
background:#00eaff;
color:black;
}

#cableMap{
height:90vh;
width:100%;
}

</style>

</head>

<body>

<header>

<h1>🌐 GLOBAL UNDERSEA INTERNET CABLES</h1>

<nav>
<button onclick="window.location.href='index.html'">Map</button>
<button onclick="window.location.href='news.html'">News</button>
<button onclick="window.location.href='markets.html'">Markets</button>
<button onclick="window.location.href='conflicts.html'">Conflicts</button>
<button onclick="window.location.href='military.html'">Military</button>
<button onclick="window.location.href='cables.html'">Cables</button>
</nav>

</header>

<div id="cableMap"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map = L.map("cableMap").setView([20,0],2);

L.tileLayer(
"https://tile.openstreetmap.org/{z}/{x}/{y}.png"
).addTo(map);


function addCable(path,name){

L.polyline(path,{
color:"cyan",
weight:3,
opacity:0.8
})
.addTo(map)
.bindPopup("<b>"+name+"</b><br>Submarine Internet Cable");

}


// Major global cables

addCable(
[
[40.7,-74],
[50,-30],
[51.5,-0.1]
],
"Transatlantic Cable"
);

addCable(
[
[34,-118],
[35,140]
],
"Transpacific Cable"
);

addCable(
[
[1.3,103.8],
[20,90],
[25,55]
],
"Asia–Middle East Cable"
);

addCable(
[
[51,-1],
[35,30],
[25,55]
],
"Europe–Middle East Cable"
);

addCable(
[
[-33,151],
[-10,120],
[1,103]
],
"Australia–Asia Cable"
);

addCable(
[
[37,-122],
[21,-157],
[35,140]
],
"Pacific Ring Cable"
);

addCable(
[
[28,77],
[25,55],
[40,30]
],
"India–Europe Cable"
);

</script>

</body>
</html>
