<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Global Markets Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>📈 GLOBAL MARKETS DASHBOARD</h1>

<nav>
<button onclick="window.location.href='index.html'">Map</button>
<button onclick="window.location.href='news.html'">News</button>
<button onclick="window.location.href='markets.html'">Markets</button>
<button onclick="window.location.href='military.html'">Military</button>
</nav>

</header>

<!-- Market ticker -->
<div class="ticker-container">

<div class="tradingview-widget-container">
<div class="tradingview-widget-container__widget"></div>

<script type="text/javascript"
src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js"
async>
{
"symbols": [
{ "proName": "FOREXCOM:SPXUSD", "title": "S&P 500" },
{ "proName": "NASDAQ:NDX", "title": "NASDAQ" },
{ "proName": "TVC:GOLD", "title": "Gold" },
{ "proName": "TVC:SILVER", "title": "Silver" },
{ "proName": "TVC:USOIL", "title": "Oil" },
{ "proName": "BINANCE:BTCUSDT", "title": "Bitcoin" }
],
"showSymbolLogo": true,
"isTransparent": true,
"displayMode": "adaptive",
"colorTheme": "dark",
"locale": "en"
}
</script>

</div>

</div>

<div class="market-container">

<h2>Major Global Markets</h2>

<div class="tradingview-widget-container">
<div id="tradingview_markets"></div>
</div>

<h2>Commodities</h2>

<div class="tradingview-widget-container">
<div id="tradingview_commodities"></div>
</div>

<h2>Crypto Markets</h2>

<div class="tradingview-widget-container">
<div id="tradingview_crypto"></div>
</div>

</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>

new TradingView.widget({
"container_id": "tradingview_markets",
"width": "100%",
"height": 500,
"symbol": "FOREXCOM:SPXUSD",
"interval": "60",
"timezone": "Etc/UTC",
"theme": "dark",
"style": "1",
"locale": "en",
"toolbar_bg": "#071424",
"enable_publishing": false,
"allow_symbol_change": true
});

new TradingView.widget({
"container_id": "tradingview_commodities",
"width": "100%",
"height": 500,
"symbol": "TVC:GOLD",
"interval": "60",
"timezone": "Etc/UTC",
"theme": "dark",
"style": "1",
"locale": "en",
"toolbar_bg": "#071424",
"enable_publishing": false,
"allow_symbol_change": true
});

new TradingView.widget({
"container_id": "tradingview_crypto",
"width": "100%",
"height": 500,
"symbol": "BINANCE:BTCUSDT",
"interval": "60",
"timezone": "Etc/UTC",
"theme": "dark",
"style": "1",
"locale": "en",
"toolbar_bg": "#071424",
"enable_publishing": false,
"allow_symbol_change": true
});

</script>

</body>
</html>
